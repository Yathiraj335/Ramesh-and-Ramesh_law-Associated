<!doctype html>
<html lang="en">
  <head>
    <!-- Basic Meta -->
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <!-- Primary SEO -->
    <title>
      Ramesh & Ramesh Law Associates | Advocates & Legal Experts Across Karnataka
    </title>

    <meta
      name="description"
      content="Ramesh & Ramesh Law Associates provides trusted legal expertise across Karnataka with 21+ years of experience in civil cases, criminal cases, property law, family law, cyber law, legal documentation, legal opinion, and registration services."
    />

    <meta
      name="keywords"
      content="Ramesh and Ramesh Law Associates, Lawyer Bangalore, Advocate Karnataka, Civil Lawyer Bangalore, Criminal Lawyer Bangalore, Property Lawyer Bangalore, Family Lawyer Karnataka, Cyber Law Advocate, Legal Documentation Bangalore, Legal Registration Karnataka"
    />

    <meta name="author" content="Ramesh & Ramesh Law Associates" />

    <meta
      name="robots"
      content="index, follow"
    />

    <!-- Favicon -->
    <link
      rel="icon"
      type="image/png"
      href="/logo-light.png"
    />

    <!-- Theme Color -->
    <meta
      name="theme-color"
      content="#0B1F3A"
    />

    <!-- Open Graph / WhatsApp / Facebook -->
    <meta
      property="og:title"
      content="Ramesh & Ramesh Law Associates | Justice. Integrity. Expertise."
    />

    <meta
      property="og:description"
      content="Trusted legal expertise across Karnataka with 21+ years in civil, criminal, property, family, cyber law, legal opinion, documentation, and registration."
    />

    <meta
      property="og:type"
      content="website"
    />

    <meta
      property="og:url"
      content="https://yourdomain.com"
    />

    <meta
      property="og:image"
      content="/logo-light.png"
    />

    <!-- Twitter / X -->
    <meta
      name="twitter:card"
      content="summary_large_image"
    />

    <meta
      name="twitter:title"
      content="Ramesh & Ramesh Law Associates"
    />

    <meta
      name="twitter:description"
      content="Trusted advocates serving clients across Karnataka."
    />

    <meta
      name="twitter:image"
      content="/logo-light.png"
    />

    <!-- Canonical -->
    <link
      rel="canonical"
      href="https://yourdomain.com"
    />
  </head>

  <body>
    <div id="root"></div>

    <script
      type="module"
      src="/client/main.tsx"
    ></script>
  </body>
</html>
